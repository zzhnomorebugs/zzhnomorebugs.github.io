{% include base_path %}

{% assign timeline = site.data.timeline %}
{% if page.lang == "zh-CN" %}
  {% assign publications_base = "/zh/publications/" %}
{% else %}
  {% assign publications_base = "/publications/" %}
{% endif %}

<div class="timeline" id="timeline">
  <div class="timeline__inner">
    <div class="timeline__axis" id="timeline-axis" aria-hidden="true"></div>
    <div class="timeline__chart" id="timeline-chart" role="img" aria-label="Research project timeline"></div>
  </div>
</div>

<script type="application/json" id="timeline-data">
[
{% for project in timeline.projects %}
  {% assign pub = nil %}
  {% assign pub_url = project.link %}
  {% assign img_url = nil %}
  {% if project.publication %}
    {% assign pub_slug = project.publication %}
    {% assign pub = site.publications | where_exp: "p", "p.path contains pub_slug" | first %}
    {% if pub and pub_url == nil %}
      {% capture pub_anchor %}#publication-{{ pub.title | slugify }}{% endcapture %}
      {% assign pub_url = publications_base | append: pub_anchor %}
    {% endif %}
  {% endif %}
  {% if project.image %}
    {% if project.image contains "://" %}
      {% assign img_url = project.image %}
    {% else %}
      {% assign img_url = project.image | prepend: '/images/' | relative_url %}
    {% endif %}
  {% elsif pub and pub.image %}
    {% if pub.image contains "://" %}
      {% assign img_url = pub.image %}
    {% else %}
      {% assign img_url = pub.image | prepend: '/images/' | relative_url %}
    {% endif %}
  {% endif %}
  {
    "name": {{ project.name | jsonify }},
    "start": {{ project.start | jsonify }},
    "end": {% if project.end %}{{ project.end | jsonify }}{% else %}null{% endif %},
    "url": {% if pub_url %}{{ pub_url | jsonify }}{% else %}null{% endif %},
    "image": {% if img_url %}{{ img_url | jsonify }}{% else %}null{% endif %},
    "lane": {{ project.lane }}
  }{% unless forloop.last %},{% endunless %}
{% endfor %}
]
</script>

<script type="application/json" id="timeline-range">
{
  "start": {% if timeline.range.start %}{{ timeline.range.start | jsonify }}{% else %}null{% endif %},
  "end": {% if timeline.range.end %}{{ timeline.range.end | jsonify }}{% else %}null{% endif %}
}
</script>

<script type="application/json" id="timeline-columns">
[
{% for col in timeline.columns %}
  {
    "label": {% if page.lang == "zh-CN" %}{{ col.label | jsonify }}{% else %}{{ col.label_en | default: col.label | jsonify }}{% endif %},
    "color": {{ col.color | jsonify }},
    "palette": {{ col.palette | jsonify }}
  }{% unless forloop.last %},{% endunless %}
{% endfor %}
]
</script>
